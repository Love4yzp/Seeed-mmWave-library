; PlatformIO project configuration for developing Seeed Arduino mmWave.
;
; Two environments:
;   [env:xiao_esp32c6] compile the library + examples on a real board.
;   [env:native]       host-side unit tests for FrameCodec (no hardware).
;
; Users consuming the library from their own project do not need this file.

[platformio]
default_envs = native

[env:xiao_esp32c6]
platform   = espressif32
board      = seeed_xiao_esp32c6
framework  = arduino
lib_deps   =
    adafruit/Adafruit NeoPixel
    Starmbi/hp_BH1750
build_flags = -std=gnu++17

[env:native]
platform         = native
test_framework   = unity
test_build_src   = yes
build_src_filter = -<*> +<FrameCodec.cpp>
build_flags      =
    -std=gnu++17
    -Isrc
