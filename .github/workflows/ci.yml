name: CI

on:
  push:
    branches: [main, 'release/**', v2-dev]
  pull_request:
    branches: [main, 'release/**', v2-dev]

jobs:
  host-tests:
    name: Host unit tests (FrameCodec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio
      - name: Run native tests
        run: pio test -e native

  arduino-lint:
    name: arduino-lint (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: arduino/arduino-lint-action@v2
        with:
          # "specification" keeps every Arduino Library Specification *requirement*
          # but drops the "best practice" rules (LP014/LP015) that would complain
          # about the existing library name containing "Arduino" and spaces —
          # we can't rename without breaking the Library Manager index entry.
          compliance: specification
          library-manager: update
          project-type: library

  compile-examples:
    name: Compile examples on XIAO ESP32-C6
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: arduino/compile-sketches@v1
        with:
          fqbn: esp32:esp32:XIAO_ESP32C6
          platforms: |
            - name: esp32:esp32
              source-url: https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          libraries: |
            - source-path: ./
            - name: Adafruit NeoPixel
            - name: hp_BH1750
            - name: U8g2
          sketch-paths: |
            - examples/mmwave_breath_heartrate
            - examples/mmwave_fall_detection
            - examples/mmwave_people_counting
            - examples/mmwave_diagnostics
            - examples/onboard_ambient_light
            - examples/onboard_indicator_led
            - examples/grove_oled_display
            - examples/integration_breath_monitor
            - examples/integration_fall_alert
          cli-compile-flags: |
            - --warnings=default
